# =============================================================================
# Immich GPT — Docker Compose
# =============================================================================
#
# Single-container deployment — one image, no bundled Redis.
#
#   Background jobs run in-process via a ThreadPoolExecutor by default.
#   If you already run Redis, point REDIS_URL at it and background jobs
#   will be dispatched through RQ instead (WORKER_CONCURRENCY is ignored
#   in that case).
#
# Quick start:
#   cp .env.example .env   # fill in at minimum: DATA_DIR, ADMIN_EMAIL,
#                          # ADMIN_PASSWORD, IMMICH_URL, IMMICH_API_KEY
#   docker compose up -d
#
# Unraid users: DATA_DIR defaults to /mnt/user/appdata/immich-gpt.
# All persistent data (SQLite DB, settings, job history) lives there.
# =============================================================================

services:

  app:
    image: ${IMMICH_GPT_IMAGE:-ghcr.io/titatom/immich-gpt:latest}
    # `docker compose build` requires Docker Buildx >= 0.17.
    # On older Unraid / distro Docker installs, build locally with:
    #   ./build.sh
    # Or point Compose at a custom local tag:
    #   IMMICH_GPT_IMAGE=immich-gpt:local docker compose up -d
    container_name: immich-gpt
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # Bind-mount the data directory so files are directly accessible on the
      # host (important for Unraid users browsing /mnt/user/appdata).
      # Override DATA_DIR in .env to point at any host path you prefer.
      - ${DATA_DIR:-/mnt/user/appdata/immich-gpt}:/data
    environment:
      DATABASE_URL: sqlite:////data/immich_gpt.db
      # ── Immich connection ──────────────────────────────────────────────
      # Optional here — can also be configured per-user in the web UI.
      IMMICH_URL: ${IMMICH_URL:-}
      IMMICH_API_KEY: ${IMMICH_API_KEY:-}
      # ── AI provider ────────────────────────────────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      # ── Authentication ─────────────────────────────────────────────────
      # The first admin account is created through the web setup wizard
      # the first time you visit the app (no users exist yet).
      # Cryptographic key for signing session cookies.
      # If not set here, the entrypoint auto-generates a key on first boot
      # and saves it to /data/.secret_key so it survives restarts.
      # For production deployments you can supply your own key via .env:
      #   SECRET_KEY=$(openssl rand -hex 32)
      SECRET_KEY: ${SECRET_KEY:-}
      # Set true when running behind HTTPS (internet-exposed deployments).
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      # ── Worker ─────────────────────────────────────────────────────────
      # Leave REDIS_URL empty to use the built-in thread-pool (recommended
      # for Unraid). Set it to dispatch jobs through an existing Redis.
      REDIS_URL: ${REDIS_URL:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
