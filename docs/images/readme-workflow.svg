<text x="412" y="358" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Sync</text>
<text x="412" y="400" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">Import all assets,</text>
<text x="412" y="434" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">favourites, or</text>
<text x="412" y="468" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">specific albums</text>
<text x="412" y="528" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="20">Dashboard controls scope</text>

<rect x="692" y="232" width="248" height="360" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
<rect x="716" y="256" width="62" height="62" rx="18" fill="#0EA5E9" fill-opacity="0.18" stroke="#38BDF8"/>
<text x="737" y="296" fill="#E0F2FE" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">3</text>
<text x="716" y="358" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Classify</text>
<text x="716" y="400" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">Generate bucket,</text>
<text x="716" y="434" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">tags, descriptions,</text>
<text x="716" y="468" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">and sub-albums</text>
<text x="716" y="528" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="20">Prompt-driven AI pipeline</text>

<rect x="996" y="232" width="200" height="360" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
<rect x="1020" y="256" width="62" height="62" rx="18" fill="#22C55E" fill-opacity="0.16" stroke="#4ADE80"/>
