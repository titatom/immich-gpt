# =============================================================================
# Immich GPT — Docker Compose
# =============================================================================
#
# Single-container deployment — one image, no extra services required.
#
#   Background jobs run in-process via a ThreadPoolExecutor by default.
#   No Redis needed.  If you already run Redis on your home lab, set
#   REDIS_URL to dispatch jobs through RQ instead (WORKER_CONCURRENCY is
#   ignored in that case).
#
# Quick start:
#   cp .env.example .env   # fill in at minimum: DATA_DIR, IMMICH_URL
#   docker compose up -d
#
# On first visit, a web setup wizard will create the initial admin account.
#
# Unraid users: DATA_DIR defaults to /mnt/user/appdata/immich-gpt.
# All persistent data (SQLite DB, settings, job history) lives there.
# =============================================================================

services:

  app:
    image: ${IMMICH_GPT_IMAGE:-ghcr.io/titatom/immich-gpt:latest}
    # `docker compose build` requires Docker Buildx >= 0.17.
    # On older Unraid / distro Docker installs, build locally with:
    #   ./build.sh
    # Or point Compose at a custom local tag:
    #   IMMICH_GPT_IMAGE=immich-gpt:local docker compose up -d
    container_name: immich-gpt
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # Bind-mount the data directory so files are directly accessible on the
      # host (important for Unraid users browsing /mnt/user/appdata).
      # Override DATA_DIR in .env to point at any host path you prefer.
      - ${DATA_DIR:-/mnt/user/appdata/immich-gpt}:/data
      # Optional: bind-mount a host directory to persist rotating log files.
      # Uncomment and set LOG_DIR in .env to enable persistent logs.
      # - ${LOG_DIR:-/mnt/user/appdata/immich-gpt/logs}:/logs
    environment:
      DATABASE_URL: sqlite:////data/immich_gpt.db
      # ── Immich connection ──────────────────────────────────────────────
      # Optional here — can also be configured per-user in the web UI.
      IMMICH_URL: ${IMMICH_URL:-}
      IMMICH_API_KEY: ${IMMICH_API_KEY:-}
      # ── AI provider ────────────────────────────────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      # ── Authentication ─────────────────────────────────────────────────
      # The first admin account is created via the web setup wizard on first visit.
      # Cryptographic key for session cookies — auto-generated on first boot
      # and persisted to /data/.secret_key if not set here.
      # Supply your own: SECRET_KEY=$(openssl rand -hex 32)
      SECRET_KEY: ${SECRET_KEY:-}
      # Set true when running behind HTTPS (e.g. Nginx/Caddy reverse proxy).
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      # ── Worker ─────────────────────────────────────────────────────────
      # Jobs run in-process by default — no Redis required.
      # Set REDIS_URL only if you already run Redis on your home lab.
      REDIS_URL: ${REDIS_URL:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      # ── Logging ────────────────────────────────────────────────────────
      # Valid values: DEBUG, INFO, WARNING, ERROR
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
