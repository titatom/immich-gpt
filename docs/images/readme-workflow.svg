<text x="1020" y="400" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">Approve</text>
<text x="1020" y="434" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">Reject</text>
<text x="1020" y="468" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">Re-analyse</text>
<text x="1020" y="502" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">Bulk actions</text>
<text x="1020" y="536" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">Write-back</text>

