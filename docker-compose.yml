# =============================================================================
# Immich GPT — Docker Compose
# =============================================================================
#
# Single-container deployment — one image, no bundled Redis.
#
#   Background jobs run in-process via a ThreadPoolExecutor by default.
#   If you already run Redis, point REDIS_URL at it and background jobs
#   will be dispatched through RQ instead (WORKER_CONCURRENCY is ignored
#   in that case).
#
# Quick start:
#   cp .env.example .env   # fill in Immich + admin bootstrap values
#   docker compose up -d
# =============================================================================

services:

  app:
    image: ghcr.io/titatom/immich-gpt:latest
    container_name: immich-gpt
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - immich_gpt_data:/data
    environment:
      DATABASE_URL: sqlite:////data/immich_gpt.db
      IMMICH_URL: ${IMMICH_URL:-}
      IMMICH_API_KEY: ${IMMICH_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      # Used once on first boot to create the initial admin account.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      # Leave empty to use the built-in thread-pool worker (default).
      # Set to redis://host:6379/0 to dispatch jobs through an existing Redis.
      REDIS_URL: ${REDIS_URL:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  immich_gpt_data:
    driver: local
