<text x="84" y="162" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="24">From raw library sync to approved write-back</text>

<rect x="84" y="232" width="248" height="360" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
<rect x="108" y="256" width="62" height="62" rx="18" fill="#0EA5E9" fill-opacity="0.18" stroke="#38BDF8"/>
