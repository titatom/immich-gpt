<text x="108" y="468" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">or OpenRouter</text>
<text x="108" y="528" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="20">Per-user settings</text>

<rect x="388" y="232" width="248" height="360" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
