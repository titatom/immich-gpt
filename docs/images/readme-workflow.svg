<text x="108" y="358" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Connect</text>
<text x="108" y="400" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">Save Immich credentials</text>
